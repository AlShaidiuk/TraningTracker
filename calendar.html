<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь тренировок</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Workout Tracker</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Дашборд</a></li>
                    <li><a href="calendar.html" class="active">Календарь</a></li>
                    <li><a href="templates.html">Шаблоны</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="calendar-section">
                <h2>Календарь посещений</h2>
                
                <div class="calendar-container">
                    <div class="month-header">
                        <h3 id="currentMonth">Месяц</h3>
                        <button id="settingsBtn" class="settings-btn" title="Настройки">
                            ⚙️
                        </button>
                    </div>
                    <div class="calendar-grid" id="calendarGrid">
                        <!-- Календарь генерируется JS -->
                    </div>
                    <button id="viewWorkoutBtn" class="btn btn-primary" disabled>
                        Смотреть тренировку
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Попап настроек дня -->
    <div id="settingsOverlay" class="popup-overlay">
        <div class="popup-content">
            <h3>Настройки дня</h3>
            <p id="selectedDateDisplay"></p>
            <div class="popup-buttons">
                <button id="addWorkoutBtn" class="btn btn-success">Добавить тренировку</button>
                <button id="removeWorkoutBtn" class="btn btn-danger">Удалить тренировку</button>
                <button id="backSettingsBtn" class="btn btn-secondary">Назад</button>
            </div>
        </div>
    </div>

    <!-- Попап выбора шаблона -->
    <div id="templateSelectionOverlay" class="popup-overlay">
        <div class="popup-content">
            <h3>Выберите шаблон</h3>
            <ul id="templateList" class="template-list"></ul>
            <p id="noTemplatesMessage" style="display:none;">Нет сохранённых шаблонов</p>
            <div class="popup-buttons">
                <button id="createTemplateBtn" class="btn btn-primary">Создать шаблон</button>
                <button id="backFromTemplatesBtn" class="btn btn-secondary">Назад</button>
            </div>
        </div>
    </div>

<!-- Попап создания нового шаблона -->
<div id="createTemplateOverlay" class="popup-overlay">
    <div class="popup-content wide-popup">
        <h3>Новый шаблон</h3>
        <input type="text" id="templateNameInput" class="input-field" placeholder="Название шаблона">
        <div id="exercisesContainer" class="exercises-container">
            <!-- Упражнения будут добавляться динамически -->
        </div>
        <button id="addExerciseBtn" class="btn btn-secondary btn-add">+ Добавить упражнение</button>
        <div class="popup-buttons">
            <button id="saveTemplateBtn" class="btn btn-success">Сохранить</button>
            <button id="cancelCreateTemplateBtn" class="btn btn-secondary">Назад</button>
        </div>
    </div>
</div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="firebase/config.js"></script>
    <script src="js/calendar-page.js"></script>
</body>
</html>
