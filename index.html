<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker - Дашборд</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Workout Tracker</h1>
            <nav>
                <ul>
                    <li><a href="#" class="active">Дашборд</a></li>
                    <li><a href="#">Упражнения</a></li>
                    <li><a href="#">Прогресс</a></li>
                    <li><a href="#">Настройки</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="dashboard">
                <h2>Дашборд</h2>
                
                <!-- Календарь тренировок -->
                <div class="training-calendar">
                    <h3>Календарь тренировок</h3>
                    <div class="next-training">
                        <label>Дата следующей тренировки:</label>
                        <div id="nextTrainingDate" class="date-display">
                            <span id="trainingDate">Выберите дату</span>
                        </div>
                        <button id="completeWorkoutBtn" class="btn btn-primary">
                            Завершить тренировку
                        </button>
                    </div>
                </div>

                <!-- Контейнер для статистики (будет заполняться позже) -->
                <div class="progress-overview">
                    <h3>Общий прогресс</h3>
                    <div id="progressContainer">
                        <p>Здесь будет отображаться прогресс тренировок</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Поп-ап окно -->
    <div id="popupOverlay" class="popup-overlay">
        <div class="popup-content">
            <h3 id="popupTitle">Завершить тренировку?</h3>
            <div class="popup-buttons">
                <button id="popupYes" class="btn btn-success">ДА</button>
                <button id="popupNo" class="btn btn-danger">НЕТ</button>
                <button id="popupCancel" class="btn btn-secondary">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Ворнинг окно -->
    <div id="warningOverlay" class="warning-overlay">
        <div class="warning-content">
            <h3>⚠️ Внимание</h3>
            <p>Заполните вес и повторы в календаре</p>
            <button id="closeWarning" class="btn btn-primary">OK</button>
        </div>
    </div>

    <script src="firebase/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/popup.js"></script>
</body>
</html>
