<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker - Дашборд</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDK (пока не используется, но готово) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Workout Tracker</h1>
            <nav>
                <ul>
                    <li><a href="index.html" class="active">Дашборд</a></li>
                    <li><a href="calendar.html">Календарь</a></li>
                    <!-- В будущем: Упражнения, Прогресс, Настройки -->
                </ul>
            </nav>
        </header>

        <main>
            <section class="dashboard">
                <h2>Дашборд</h2>
                
                <!-- Календарь тренировок (только посещаемость) -->
                <div class="training-calendar">
                    <h3>Ближайшая тренировка</h3>
                    <div class="next-training">
                        <div class="date-display" id="nextTrainingDate">
                            <span id="trainingDate">Загрузка...</span>
                        </div>
                        <button id="completeWorkoutBtn" class="btn btn-primary">
                            Завершить тренировку
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Поп-ап окно -->
    <div id="popupOverlay" class="popup-overlay">
        <div class="popup-content">
            <h3>Завершить тренировку?</h3>
            <div class="popup-buttons">
                <button id="popupYes" class="btn btn-success">ДА</button>
                <button id="popupNo" class="btn btn-danger">НЕТ</button>
                <button id="popupCancel" class="btn btn-secondary">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Ворнинг окно -->
    <div id="warningOverlay" class="warning-overlay">
        <div class="warning-content">
            <h3>⚠️ Внимание</h3>
            <p>Заполните вес и повторы в календаре</p>
            <button id="closeWarning" class="btn btn-primary">OK</button>
        </div>
    </div>

    <script src="firebase/config.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/popup.js"></script>
    <script>
        // Инициализация после загрузки DOM
        document.addEventListener('DOMContentLoaded', () => {
            // Инициализация календаря на дашборде
            const trainingCal = new TrainingCalendar();
            const popup = new PopupManager(trainingCal);

            // Привязываем кнопку открытия попапа
            const completeBtn = document.getElementById('completeWorkoutBtn');
            if (completeBtn) {
                completeBtn.addEventListener('click', () => {
                    popup.showPopup();
                });
            }
        });
    </script>
</body>
</html>
